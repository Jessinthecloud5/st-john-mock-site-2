<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12344E" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg-grad)" stroke="#016A77" stroke-width="2" />
  
  <!-- Inner ring decoration -->
  <circle cx="100" cy="100" r="88" stroke="#ffffff" stroke-width="1" stroke-dasharray="4 4" opacity="0.3" />

  <!-- Stylized Portrait Silhouette -->
  <!-- Shoulders -->
  <path d="M 40 170 C 40 140, 60 125, 100 125 C 140 125, 160 140, 160 170 Z" fill="#ffffff" opacity="0.9" />
  
  <!-- Neck -->
  <path d="M 90 125 L 90 110 L 110 110 L 110 125 Z" fill="#ffffff" opacity="0.9" />
  
  <!-- Head -->
  <circle cx="100" cy="85" r="28" fill="#ffffff" opacity="0.9" />

  <!-- Hair / Glasses Accents -->
  <path d="M 75 75 C 75 60, 100 55, 125 75 C 122 65, 110 60, 100 60 C 90 60, 78 65, 75 75 Z" fill="#b45309" />
  
  <!-- Collar -->
  <polygon points="100,135 88,125 112,125" fill="#f8fafc" />
  <rect x="97" y="125" width="6" height="15" fill="#12344E" />
</svg>
