<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#831843" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg-grad)" stroke="#016A77" stroke-width="2" />
  
  <!-- Inner ring decoration -->
  <circle cx="100" cy="100" r="88" stroke="#ffffff" stroke-width="1" stroke-dasharray="4 4" opacity="0.3" />

  <!-- Stylized Portrait Silhouette -->
  <!-- Shoulders -->
  <path d="M 45 170 C 45 138, 65 125, 100 125 C 135 125, 155 138, 155 170 Z" fill="#ffffff" opacity="0.9" />
  
  <!-- Neck -->
  <path d="M 92 125 L 92 110 L 108 110 L 108 125 Z" fill="#ffffff" opacity="0.9" />
  
  <!-- Head -->
  <circle cx="100" cy="85" r="26" fill="#ffffff" opacity="0.9" />

  <!-- Hair / Accents -->
  <path d="M 72 85 C 70 70, 80 50, 100 50 C 120 50, 130 70, 128 85 C 130 95, 125 105, 125 105 C 125 105, 120 85, 100 85 C 80 85, 75 105, 75 105 C 75 105, 70 95, 72 85 Z" fill="#b45309" />
  <circle cx="100" cy="48" r="9" fill="#b45309" /> <!-- bun -->
  
  <!-- Collar -->
  <polygon points="100,132 90,125 110,125" fill="#f8fafc" />
  <rect x="98" y="125" width="4" height="12" fill="#581c87" />
</svg>
