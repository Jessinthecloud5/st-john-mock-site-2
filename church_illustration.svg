<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" fill="none" stroke="currentColor">
  <!-- Style for customization -->
  <style>
    .sky-glow { fill: url(#sky-gradient); opacity: 0.15; }
    .church-stroke { stroke: #12344E; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .church-accent { stroke: #016A77; stroke-width: 1.5; }
    .tree-stroke { stroke: #475569; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.7; }
    .ground-line { stroke: #12344E; stroke-width: 2; stroke-linecap: round; }
    .detail-stroke { stroke: #64748b; stroke-width: 1; opacity: 0.6; }
  </style>

  <defs>
    <radialGradient id="sky-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#016A77" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Sky Glow -->
  <circle cx="400" cy="180" r="220" class="sky-glow" />

  <!-- Ground Line -->
  <line x1="50" y1="350" x2="750" y2="350" class="ground-line" />

  <!-- Left Trees -->
  <path d="M 120 350 C 100 300, 140 260, 160 270 C 170 240, 200 240, 210 260 C 230 250, 250 280, 230 350 Z" class="tree-stroke" fill="#f1f5f9" />
  <path d="M 80 350 C 60 310, 90 280, 110 290 C 120 270, 140 270, 150 290 C 160 280, 180 300, 170 350 Z" class="tree-stroke" fill="#f8fafc" />

  <!-- Right Trees -->
  <path d="M 640 350 C 620 290, 660 250, 680 260 C 695 230, 725 230, 735 260 C 755 250, 775 285, 755 350 Z" class="tree-stroke" fill="#f1f5f9" />
  <path d="M 590 350 C 570 310, 600 285, 615 295 C 625 275, 645 275, 655 295 C 665 285, 685 305, 675 350 Z" class="tree-stroke" fill="#f8fafc" />

  <!-- Church Structure -->
  <!-- Main Body -->
  <rect x="300" y="220" width="200" height="130" class="church-stroke" fill="#ffffff" />
  
  <!-- Main Roof -->
  <polygon points="280,220 400,140 520,220" class="church-stroke" fill="#ffffff" />
  
  <!-- Steeple Tower Base -->
  <rect x="375" y="100" width="50" height="70" class="church-stroke" fill="#ffffff" />
  <line x1="375" y1="140" x2="425" y2="140" class="detail-stroke" />
  <line x1="375" y1="120" x2="425" y2="120" class="detail-stroke" />

  <!-- Steeple Spire -->
  <polygon points="365,100 400,30 435,100" class="church-stroke" fill="#ffffff" />

  <!-- Cross on top -->
  <line x1="400" y1="10" x2="400" y2="30" class="church-accent" stroke-width="2" />
  <line x1="392" y1="17" x2="408" y2="17" class="church-accent" stroke-width="2" />

  <!-- Door (Arched) -->
  <path d="M 370 350 L 370 300 A 30 30 0 0 1 430 300 L 430 350 Z" class="church-stroke" fill="#f8fafc" />
  <line x1="400" y1="270" x2="400" y2="350" class="detail-stroke" />
  <!-- Door outline detail -->
  <path d="M 375 350 L 375 303 A 25 25 0 0 1 425 303 L 425 350" class="detail-stroke" />

  <!-- Main Window (Circular above door) -->
  <circle cx="400" cy="200" r="22" class="church-stroke" fill="#f8fafc" />
  <line x1="400" y1="178" x2="400" y2="222" class="detail-stroke" />
  <line x1="378" y1="200" x2="422" y2="200" class="detail-stroke" />
  <path d="M 384.5 184.5 L 415.5 215.5" class="detail-stroke" />
  <path d="M 384.5 215.5 L 415.5 184.5" class="detail-stroke" />

  <!-- Small Windows on Tower -->
  <path d="M 392 133 L 392 125 A 8 8 0 0 1 408 125 L 408 133 Z" class="church-stroke" fill="#f8fafc" />
  <line x1="400" y1="120" x2="400" y2="133" class="detail-stroke" />

  <!-- Windows on Main Body (Left & Right) -->
  <!-- Left Windows -->
  <path d="M 320 310 L 320 270 A 10 10 0 0 1 340 270 L 340 310 Z" class="church-stroke" fill="#f8fafc" />
  <line x1="330" y1="260" x2="330" y2="310" class="detail-stroke" />
  
  <!-- Right Windows -->
  <path d="M 460 310 L 460 270 A 10 10 0 0 1 480 270 L 480 310 Z" class="church-stroke" fill="#f8fafc" />
  <line x1="470" y1="260" x2="470" y2="310" class="detail-stroke" />

  <!-- Front Sign Board -->
  <rect x="360" y="325" width="80" height="25" rx="3" class="detail-stroke" fill="#ffffff" stroke-width="1" />
  <text x="400" y="337" font-family="'EB Garamond', Georgia, serif" font-size="6.5" font-weight="bold" fill="#12344E" text-anchor="middle">St. John</text>
  <text x="400" y="345" font-family="'Inter', sans-serif" font-size="4" font-weight="bold" fill="#64748b" text-anchor="middle" letter-spacing="0.5">PRESBYTERIAN</text>

  <!-- Architectural details (siding lines) -->
  <line x1="300" y1="240" x2="335" y2="240" class="detail-stroke" />
  <line x1="300" y1="260" x2="315" y2="260" class="detail-stroke" />
  <line x1="300" y1="280" x2="315" y2="280" class="detail-stroke" />
  <line x1="300" y1="300" x2="315" y2="300" class="detail-stroke" />
  <line x1="300" y1="320" x2="355" y2="320" class="detail-stroke" />

  <line x1="465" y1="240" x2="500" y2="240" class="detail-stroke" />
  <line x1="485" y1="260" x2="500" y2="260" class="detail-stroke" />
  <line x1="485" y1="280" x2="500" y2="280" class="detail-stroke" />
  <line x1="485" y1="300" x2="500" y2="300" class="detail-stroke" />
  <line x1="445" y1="320" x2="500" y2="320" class="detail-stroke" />

  <!-- Roof Shingles/Details -->
  <path d="M 330 186 L 335 192 M 360 166 L 365 172 M 470 186 L 465 192 M 440 166 L 435 172" class="detail-stroke" />
</svg>
